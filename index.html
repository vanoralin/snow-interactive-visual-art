<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ผงหิมะไหลลงตัว (AI Body Outline)</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="stage">
    <div id="camwrap">
      <video id="camvideo" autoplay playsinline muted></video>
    </div>
    <canvas id="bgcanvas"></canvas>
    <canvas id="fxcanvas"></canvas>
  </div>

  <div id="ui">
    <div id="controls">
      <button id="camBtn" data-tooltip="เปิด/ปิดกล้อง AI ตรวจจับคน">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
      </button>
      <button id="handBtn" class="active" data-tooltip="เปิด/ปิดใช้มือควบคุม (แบมือ = หยุดหิมะ | ชี้ขึ้น = หิมะย้อนกลับ)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"></path>
          <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path>
          <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path>
          <path d="M6 10V8a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10a7 7 0 0 0 7 7h3a6 6 0 0 0 6-6V11"></path>
        </svg>
      </button>
    </div>
  </div>

  <div id="hint">ขยับเมาส์/ลากนิ้วบนจอ หรือเปิดกล้องให้ AI ตรวจจับตัวคนเพื่อให้หิมะเกาะสะสมบนตัว</div>
  <div id="permMsg">ไม่สามารถเข้าถึงกล้องได้<br>หรือเซิร์ฟเวอร์ AI ออฟไลน์ อยู่ในโหมดจำลองด้วยเมาส์นะ</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
